    <circle cx="314" cy="337" r="8"/><circle cx="294" cy="346" r="7"/><circle cx="275" cy="355" r="6"/><circle cx="257" cy="364" r="5"/><circle cx="240" cy="373" r="4"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="452" text-anchor="middle" class="ar">الهيئة الاتحاديـة</text>
  <text x="300" y="506" text-anchor="middle" class="ar">للهويـة والجنسيـة</text>
  <text x="300" y="556" text-anchor="middle" class="en1">FEDERAL AUTHORITY</text>
  <text x="300" y="586" text-anchor="middle" class="en2">FOR IDENTITY &amp; CITIZENSHIP</text>
